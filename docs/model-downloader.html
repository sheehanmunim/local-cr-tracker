<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local CR Tracker Model Downloader</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        line-height: 1.45;
      }

      body {
        margin: 0;
        color: #182026;
        background: #f7f9fb;
      }

      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 48px 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 32px;
        font-weight: 720;
      }

      p {
        margin: 0 0 16px;
        color: #4b5563;
      }

      button {
        border: 0;
        border-radius: 6px;
        padding: 12px 16px;
        color: white;
        background: #135cc8;
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.58;
      }

      code {
        border-radius: 4px;
        padding: 2px 5px;
        background: #e9eef5;
      }

      .panel {
        margin-top: 24px;
        border: 1px solid #d9e1ea;
        border-radius: 8px;
        background: white;
      }

      .row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 18px;
        align-items: center;
        padding: 18px;
        border-top: 1px solid #edf1f5;
      }

      .row:first-child {
        border-top: 0;
      }

      .name {
        font-weight: 700;
      }

      .status {
        margin-top: 4px;
        color: #5b6673;
        font-size: 14px;
      }

      progress {
        width: min(280px, 36vw);
        height: 14px;
      }

      .log {
        min-height: 120px;
        margin-top: 24px;
        border: 1px solid #d9e1ea;
        border-radius: 8px;
        padding: 14px;
        overflow: auto;
        white-space: pre-wrap;
        color: #26313c;
        background: #ffffff;
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Local CR Tracker Models</h1>
      <p>
        Select the cloned <code>local-cr-tracker</code> folder. Chrome will
        create <code>.cache/ollama-models</code> and save the required model
        files there.
      </p>
      <button id="start">Select Folder And Download Models</button>

      <section class="panel" id="models"></section>
      <div class="log" id="log">Ready.</div>
    </main>

    <script>
      const models = [
        {
          name: "qwen3.5:4b",
          fileName: "qwen3.5-4b.gguf",
          size: 3389971840,
          parts: [
            ["qwen3.5-4b.gguf.parts/part-0000", 268435456],
            ["qwen3.5-4b.gguf.parts/part-0001", 268435456],
            ["qwen3.5-4b.gguf.parts/part-0002", 268435456],
            ["qwen3.5-4b.gguf.parts/part-0003", 268435456],
            ["qwen3.5-4b.gguf.parts/part-0004", 268435456],
            ["qwen3.5-4b.gguf.parts/part-0005", 268435456],
            ["qwen3.5-4b.gguf.parts/part-0006", 268435456],
            ["qwen3.5-4b.gguf.parts/part-0007", 268435456],
            ["qwen3.5-4b.gguf.parts/part-0008", 268435456],
            ["qwen3.5-4b.gguf.parts/part-0009", 268435456],
            ["qwen3.5-4b.gguf.parts/part-0010", 268435456],
            ["qwen3.5-4b.gguf.parts/part-0011", 268435456],
            ["qwen3.5-4b.gguf.parts/part-0012", 168746368],
          ],
        },
        {
          name: "gemma3:4b",
          fileName: "gemma3-4b.gguf",
          size: 3338792448,
          parts: [
            ["gemma3-4b.gguf.parts/part-0000", 268435456],
            ["gemma3-4b.gguf.parts/part-0001", 268435456],
            ["gemma3-4b.gguf.parts/part-0002", 268435456],
            ["gemma3-4b.gguf.parts/part-0003", 268435456],
            ["gemma3-4b.gguf.parts/part-0004", 268435456],
            ["gemma3-4b.gguf.parts/part-0005", 268435456],
            ["gemma3-4b.gguf.parts/part-0006", 268435456],
            ["gemma3-4b.gguf.parts/part-0007", 268435456],
            ["gemma3-4b.gguf.parts/part-0008", 268435456],
            ["gemma3-4b.gguf.parts/part-0009", 268435456],
            ["gemma3-4b.gguf.parts/part-0010", 268435456],
            ["gemma3-4b.gguf.parts/part-0011", 268435456],
            ["gemma3-4b.gguf.parts/part-0012", 117566976],
          ],
        },
      ];

      const startButton = document.querySelector("#start");
      const modelList = document.querySelector("#models");
      const logBox = document.querySelector("#log");
      const rows = new Map();

      function formatBytes(bytes) {
        const units = ["B", "KB", "MB", "GB"];
        let value = bytes;
        let index = 0;
        while (value >= 1024 && index < units.length - 1) {
          value /= 1024;
          index += 1;
        }
        return `${value.toFixed(index === 0 ? 0 : 1)} ${units[index]}`;
      }

      function log(message) {
        logBox.textContent += `\n${message}`;
        logBox.scrollTop = logBox.scrollHeight;
      }

      function renderModels() {
        modelList.textContent = "";
        for (const model of models) {
          const row = document.createElement("div");
          row.className = "row";
          row.innerHTML = `
            <div>
              <div class="name">${model.name}</div>
              <div class="status">${model.fileName} - ${formatBytes(model.size)}</div>
            </div>
            <progress max="${model.size}" value="0"></progress>
          `;
          rows.set(model.fileName, {
            progress: row.querySelector("progress"),
            status: row.querySelector(".status"),
          });
          modelList.appendChild(row);
        }
      }

      async function getModelDirectory(rootDirectory) {
        const cacheDirectory = await rootDirectory.getDirectoryHandle(".cache", {
          create: true,
        });
        return await cacheDirectory.getDirectoryHandle("ollama-models", {
          create: true,
        });
      }

      async function streamPart(partPath, writer, onBytes) {
        const response = await fetch(partPath, { cache: "no-store" });
        if (!response.ok || !response.body) {
          throw new Error(`${partPath} returned HTTP ${response.status}`);
        }

        const reader = response.body.getReader();
        while (true) {
          const { done, value } = await reader.read();
          if (done) {
            return;
          }
          await writer.write(value);
          onBytes(value.byteLength);
        }
      }

      async function downloadModel(model, directory) {
        const state = rows.get(model.fileName);
        state.progress.value = 0;
        state.status.textContent = `${model.fileName} - starting`;

        const handle = await directory.getFileHandle(model.fileName, {
          create: true,
        });
        const writer = await handle.createWritable();
        let downloaded = 0;

        try {
          for (let index = 0; index < model.parts.length; index += 1) {
            const [partPath] = model.parts[index];
            state.status.textContent = `${model.fileName} - chunk ${index + 1} of ${model.parts.length}`;
            log(`${model.fileName}: downloading ${partPath}`);
            await streamPart(partPath, writer, (bytes) => {
              downloaded += bytes;
              state.progress.value = downloaded;
            });
          }
          await writer.close();
        } catch (error) {
          await writer.abort();
          throw error;
        }

        state.status.textContent = `${model.fileName} - complete (${formatBytes(downloaded)})`;
        log(`${model.fileName}: complete`);
      }

      async function startDownload() {
        if (!("showDirectoryPicker" in window)) {
          log("This browser does not support folder writes. Use current Chrome or Edge.");
          return;
        }

        startButton.disabled = true;
        try {
          const rootDirectory = await window.showDirectoryPicker({
            mode: "readwrite",
          });
          const modelDirectory = await getModelDirectory(rootDirectory);
          for (const model of models) {
            await downloadModel(model, modelDirectory);
          }
          log("Done. Return to PowerShell and run: npm run local");
        } catch (error) {
          log(`Failed: ${error.message}`);
          startButton.disabled = false;
        }
      }

      renderModels();
      startButton.addEventListener("click", startDownload);
    </script>
  </body>
</html>
